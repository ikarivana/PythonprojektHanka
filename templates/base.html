{% load static %}
<!DOCTYPE html>

<html lang="cs">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DWKNJZ7V7E"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-DWKNJZ7V7E');
    </script>

    <meta name="description"
          content="{% block description %}Profesionální pedikúra, péče o nohy a přírodní kosmetika Loub Natural.{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Loub Natural{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Open+Sans:wght@400;500;600&display=swap"
          rel="stylesheet">

    <!-- Vlastní CSS -->
    <link rel="stylesheet"
          href="{% static 'css/uprava.css' %}">

</head>

<body>

{% include 'navbar.html' %}

<main class="main-content">

    {% block content %}
    {% endblock %}

</main>

<footer class="footer-custom">

    <div class="container">

        <div class="footer-content">

            <h5>Loub Natural</h5>

            <p>

                Pedikúra • Zdraví • Péče o tělo

            </p>

            <small>

                © 2026 Loub Natural

            </small>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
