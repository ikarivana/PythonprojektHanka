{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loub-Natural</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Vaše vlastní CSS - Zkuste toto nechat aktivní, pokud to rozbije formulář, je chyba v tomto souboru -->
    <link rel="stylesheet" href="{% static 'css/uprava.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

    {% include 'navbar.html' %}

    <main class="flex-shrink-0">
        <div class="container py-4">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer mt-auto py-4 text-center text-dark bg-light">
        <div class="container">
            <p class="mt-2 mb-0 text-muted"><small>© Vytvořeno Eliv 2026</small></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
