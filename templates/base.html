{% load static %}
<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Loub Natural{% endblock %}</title>

    <meta name="description"
          content="{% block description %}Profesionální pedikúra, péče o nohy a přírodní kosmetika Loub Natural.{% endblock %}">

    <meta name="robots" content="index, follow">

    <link rel="canonical" href="{{ request.build_absolute_uri }}">

    <meta name="msvalidate.01" content="335334681C7DCB402663C85BBBC15799" />

    <link rel="stylesheet" href="{% static 'django_ckeditor_5/dist/styles.css' %}">

    <!-- Google Consent Mode -->
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('consent', 'default', {
            analytics_storage: 'denied',
            ad_storage: 'denied',
            ad_user_data: 'denied',
            ad_personalization: 'denied'
        });

        gtag('js', new Date());
    </script>

    <!-- Google Analytics -->
    <script async
            src="https://www.googletagmanager.com/gtag/js?id=G-DWKNJZ7V7E">
    </script>

    <script>
        gtag('config', 'G-DWKNJZ7V7E');
    </script>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Open+Sans:wght@400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/uprava.css' %}">

</head>

<body>

{% include 'navbar.html' %}

<main class="main-content">

    {% block content %}
    {% endblock %}

</main>

<footer class="footer-custom">

    <div class="container">

        <div class="footer-content">

            <h5>Loub Natural</h5>

            <p>
                Pedikúra • Zdraví • Péče o tělo
            </p>

            <small>
                © 2026 Loub Natural
            </small>

        </div>

    </div>

</footer>


<!-- COOKIE BANNER -->

<div id="cookie-banner" class="cookie-banner">

    <div class="cookie-content">

        <p>

            Tento web používá nezbytné cookies a se souhlasem také analytické
            cookies pro měření návštěvnosti.

        </p>

        <div class="cookie-buttons">

            <button id="acceptCookies" class="btn btn-success">
                Přijmout vše
            </button>

            <button id="rejectCookies" class="btn btn-outline-secondary">
                Pouze nezbytné
            </button>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script>

const banner = document.getElementById("cookie-banner");

const consent = localStorage.getItem("cookieConsent");

if (!consent) {
    banner.style.display = "block";
}

if (consent === "accepted") {

    gtag('consent', 'update', {
        analytics_storage: 'granted',
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
    });

}

document.getElementById("acceptCookies").addEventListener("click", function () {

    localStorage.setItem("cookieConsent", "accepted");

    gtag('consent', 'update', {
        analytics_storage: 'granted',
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
    });

    banner.style.display = "none";

});

document.getElementById("rejectCookies").addEventListener("click", function () {

    localStorage.setItem("cookieConsent", "rejected");

    banner.style.display = "none";

});

</script>

</body>
</html>
