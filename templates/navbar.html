{% load static %}

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
        <!-- Logo a název -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <b class="me-2">Loub-Natural</b>
            <img src="{% static 'image/cunik-logo.jpg' %}" alt="Logo" class="rounded-circle" style="height: 32px">
        </a>

        <!-- Tlačítko pro mobilní menu -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <!-- Hlavní menu -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'pedicure' %}">Pedikúra</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'health' %}">Zdraví</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Kontakt</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'gdpr' %}">GDPR</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'images' %}">Obrázky</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'seznam_novinek' %}">Novinky</a></li>
            </ul>

            <!-- Vyhledávání -->
            <form method="post" action="/search/" class="d-flex me-lg-3 mb-2 mb-lg-0">
                {% csrf_token %}
                <div class="input-group input-group-sm">
                    <input class="form-control rounded-pill" type="text" name="search" placeholder="Hledat...">
                    <button class="btn btn-primary rounded-pill ms-1" type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>

            <!-- Uživatel / Přihlášení -->
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    {% if user.is_authenticated %}
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> {{ user.username }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><a class="dropdown-item" href="{% url 'logout' %}">Odhlásit</a></li>
                            <li><a class="dropdown-item" href="{% url 'password_change' %}">Změna hesla</a></li>
                        </ul>
                    {% else %}
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> Účet
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><a class="dropdown-item" href="{% url 'login' %}">Přihlásit</a></li>
                            <li><a class="dropdown-item" href="{% url 'password_reset' %}">Reset hesla</a></li>
                        </ul>
                    {% endif %}
                </li>
            </ul>
        </div>
    </div>
</nav>
