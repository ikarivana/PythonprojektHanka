{% load static %}

<nav class="navbar navbar-expand-lg natural-navbar">

    <div class="container">

        <!-- Logo -->

        <a class="navbar-brand d-flex align-items-center"
           href="{% url 'home' %}">

            <img src="{% static 'image/cunik-logo.jpg' %}"
                 alt="Loub-Natural"
                 class="navbar-logo">

            <span class="navbar-title">

                Loub-Natural

            </span>

        </a>

        <!-- Mobilní menu -->

        <button class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent"
                aria-controls="navbarContent"
                aria-expanded="false"
                aria-label="Přepnout navigaci">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarContent">

            <!-- Menu -->

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        Domů
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'pedicure' %}">
                        Pedikúra
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'health' %}">
                        Zdraví
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">
                        Kontakt
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'images' %}">
                        Galerie
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'seznam_novinek' %}">
                        Novinky
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'gdpr' %}">
                        GDPR
                    </a>
                </li>

            </ul>

            <!-- Vyhledávání -->

            <form method="post"
                  action="{% url 'search' %}"
                  class="search-form">

                {% csrf_token %}

                <div class="input-group">

                    <input type="text"
                           name="search"
                           class="form-control search-input"
                           placeholder="Hledat..."
                           autocomplete="off"
                           aria-label="Vyhledávání">

                    <button class="btn btn-natural"
                            type="submit">

                        <i class="fas fa-search"></i>

                    </button>

                </div>

            </form>

            <!-- Účet -->

            <ul class="navbar-nav ms-lg-3">

                <li class="nav-item dropdown">

                    {% if user.is_authenticated %}

                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            <i class="fas fa-user-circle me-1"></i>

                            {{ user.username }}

                        </a>

                        <ul class="dropdown-menu dropdown-menu-end natural-dropdown">

                            <li>

                                <a class="dropdown-item"
                                   href="{% url 'password_change' %}">

                                    Změna hesla

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item"
                                   href="{% url 'logout' %}">

                                    Odhlásit

                                </a>

                            </li>

                        </ul>

                    {% else %}

                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            <i class="fas fa-user me-1"></i>

                            Účet

                        </a>

                        <ul class="dropdown-menu dropdown-menu-end natural-dropdown">

                            <li>

                                <a class="dropdown-item"
                                   href="{% url 'login' %}">

                                    Přihlášení

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item"
                                   href="{% url 'password_reset' %}">

                                    Obnovit heslo

                                </a>

                            </li>

                        </ul>

                    {% endif %}

                </li>

            </ul>

        </div>

    </div>

</nav>
